<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초대장 — 영남테니스회장배</title>
<meta property="og:type"         content="website">
<meta property="og:title"        content="초대장">
<meta property="og:description"  content="대회 안내 및 초청 페이지 — 참가 클럽에 공유하세요">
<meta property="og:image"        content="https://hoons9096-cloud.github.io/Tennis-invite/qr-invite.png">
<meta property="og:image:width"  content="560">
<meta property="og:image:height" content="700">
<meta property="og:url"          content="https://hoons9096-cloud.github.io/Tennis-invite/qr-invite.html">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.12);width:100%;max-width:400px;overflow:hidden;text-align:center;}
.card-header{background:#1D4ED8;padding:28px 24px 22px;color:#fff;}
.sub{font-size:.78rem;font-weight:600;letter-spacing:2px;opacity:.85;margin-bottom:10px;}
.icon{font-size:2.6rem;margin-bottom:8px;}
.title{font-size:2rem;font-weight:900;letter-spacing:-0.5px;line-height:1.2;}
.card-body{padding:28px 24px 32px;}
.desc{font-size:.93rem;color:#475569;line-height:1.7;margin-bottom:24px;}
.qr-wrap{display:inline-block;background:#EFF6FF;border:3px solid #1D4ED8;border-radius:16px;padding:16px;cursor:pointer;transition:transform .15s,box-shadow .15s;text-decoration:none;}
.qr-wrap:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(0,0,0,.15);}
#qrcode canvas,#qrcode img{display:block;width:200px!important;height:200px!important;}
.hint{font-size:.8rem;color:#1D4ED8;font-weight:700;margin-top:10px;}
.url-box{margin-top:20px;background:#f1f5f9;border-radius:10px;padding:8px 14px;font-size:.72rem;color:#64748b;word-break:break-all;line-height:1.5;}
.go-btn{display:block;margin:20px auto 0;background:#1D4ED8;color:#fff;border:none;border-radius:12px;padding:13px 32px;font-size:1rem;font-weight:800;cursor:pointer;text-decoration:none;transition:opacity .15s,transform .12s;}
.go-btn:hover{opacity:.88;transform:translateY(-1px);}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="sub">YOUNG NAM TENNIS CLUB</div>
    <div class="icon">🎾</div>
    <div class="title">초대장</div>
  </div>
  <div class="card-body">
    <p class="desc">대회 안내 및 초청 페이지 — 참가 클럽에 공유하세요</p>
    <a class="qr-wrap" href="https://hoons9096-cloud.github.io/Tennis-invite/" target="_blank">
      <div id="qrcode"></div>
    </a>
    <div class="hint">👆 QR 스캔 또는 클릭해서 바로 이동</div>
    <div class="url-box">https://hoons9096-cloud.github.io/Tennis-invite/</div>
    <a class="go-btn" href="https://hoons9096-cloud.github.io/Tennis-invite/" target="_blank">바로 이동 →</a>
  </div>
</div>
<script>
new QRCode(document.getElementById('qrcode'),{text:'https://hoons9096-cloud.github.io/Tennis-invite/',width:200,height:200,colorDark:'#0f172a',colorLight:'#EFF6FF',correctLevel:QRCode.CorrectLevel.H});
</script>
</body>
</html>
