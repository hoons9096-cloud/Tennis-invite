<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테니스 MBTI - S.E.M.T</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090f;min-height:100vh;font-family:'Noto Sans KR',sans-serif;color:#f0f0f0;overflow-x:hidden}
.bg{position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 10% 10%,rgba(99,102,241,.1) 0%,transparent 45%),
    radial-gradient(ellipse at 90% 90%,rgba(236,72,153,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(16,185,129,.04) 0%,transparent 60%)}
.wrap{position:relative;max-width:520px;margin:0 auto;padding:28px 18px 60px;z-index:1}

/* ── HEADER ── */
.header{text-align:center;padding:14px 0 26px}
.brand{display:inline-block;font-size:11px;font-weight:900;letter-spacing:6px;color:#818cf8;margin-bottom:14px;
  text-shadow:0 0 20px rgba(129,140,248,.5)}
.header h1{font-size:28px;font-weight:900;line-height:1.2;margin-bottom:8px}
.grad{background:linear-gradient(135deg,#818cf8,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:12px;color:rgba(240,240,240,.38);letter-spacing:.5px;line-height:1.6}
.hicon{font-size:40px;margin-bottom:10px;display:block;animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}

/* axis chips */
.axes{display:flex;justify-content:center;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.ax{font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 11px;border-radius:20px;border:1px solid}
.ax-ad{color:#f59e0b;border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.07)}
.ax-pc{color:#10b981;border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.07)}
.ax-bn{color:#818cf8;border-color:rgba(129,140,248,.35);background:rgba(129,140,248,.07)}
.ax-er{color:#ec4899;border-color:rgba(236,72,153,.35);background:rgba(236,72,153,.07)}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:20px}
.prog-top{display:flex;justify-content:space-between;font-size:11px;color:rgba(240,240,240,.3);margin-bottom:7px}
.prog-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#818cf8,#ec4899);border-radius:2px;transition:width .5s ease}

/* ── QUESTION ── */
.q-card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px 20px;margin-bottom:14px}
.q-axis-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:20px;margin-bottom:12px}
.q-text{font-size:16px;font-weight:700;line-height:1.6;color:#f0f0f0;margin-bottom:20px}

/* options */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:11px}
.opt:hover{border-color:rgba(129,140,248,.4);background:rgba(129,140,248,.06)}
.opt.sel{border-color:#818cf8;background:rgba(129,140,248,.12)}
.opt-circle{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;margin-top:1px;transition:all .2s}
.opt.sel .opt-circle{background:#818cf8;border-color:#818cf8;box-shadow:0 0 10px rgba(129,140,248,.5)}
.opt-txt{font-size:13px;line-height:1.6;color:rgba(240,240,240,.75)}
.opt.sel .opt-txt{color:#fff}

/* nav */
.nav{display:flex;gap:10px;margin-top:14px}
.nbtn{flex:1;padding:14px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.nprev{background:rgba(255,255,255,.05);color:rgba(240,240,240,.4);border:1px solid rgba(255,255,255,.09)}
.nprev:hover{background:rgba(255,255,255,.09);color:#f0f0f0}
.nnext{background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;box-shadow:0 4px 16px rgba(129,140,248,.3)}
.nnext:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(129,140,248,.4)}
.nnext:disabled{background:rgba(255,255,255,.07);color:rgba(240,240,240,.22);box-shadow:none;transform:none;cursor:not-allowed}

/* ── RESULT ── */
.result{display:none}
.result.show{display:block;animation:up .7s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* type card */
.type-card{border-radius:18px;padding:28px 22px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.type-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center top,rgba(255,255,255,.06),transparent 65%)}
.tc-brand{font-size:10px;font-weight:700;letter-spacing:4px;margin-bottom:12px;opacity:.7}
.tc-code{font-size:42px;font-weight:900;letter-spacing:8px;margin-bottom:6px;line-height:1}
.tc-emoji{font-size:44px;margin-bottom:8px}
.tc-name{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:.5px}
.tc-hero{font-size:13px;margin-bottom:16px;opacity:.6;letter-spacing:1px}
.tc-desc{font-size:14px;line-height:1.9;opacity:.85;padding:0 4px}

/* axis result bars */
.axis-result{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.ar-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px}
.ar-labels{display:flex;justify-content:space-between;margin-bottom:8px}
.ar-lbl{font-size:11px;font-weight:700;letter-spacing:1px}
.ar-bar-bg{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:6px;position:relative}
.ar-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.ar-result{font-size:13px;font-weight:700;text-align:center}

/* strengths & weaknesses */
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sw-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px}
.sw-title{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.sw-list{display:flex;flex-direction:column;gap:7px}
.sw-item{font-size:12px;line-height:1.55;color:rgba(240,240,240,.65);display:flex;gap:7px;align-items:flex-start}
.sw-dot{font-size:10px;margin-top:2px;flex-shrink:0}

/* compatible */
.compat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.compat-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(240,240,240,.4);margin-bottom:14px}
.compat-row{display:flex;gap:10px;flex-wrap:wrap}
.compat-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:70px}
.compat-code{font-size:15px;font-weight:900;letter-spacing:2px}
.compat-lbl{font-size:10px;color:rgba(240,240,240,.4)}

/* famous players */
.famous-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;margin-bottom:18px}
.famous-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(240,240,240,.4);margin-bottom:12px}
.famous-list{display:flex;flex-wrap:wrap;gap:8px}
.famous-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);color:rgba(240,240,240,.7)}

/* buttons */
.sbtn{width:100%;padding:15px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;margin-bottom:9px}
.sbtn-main{background:linear-gradient(135deg,#818cf8,#ec4899);color:#fff;box-shadow:0 4px 16px rgba(129,140,248,.3)}
.sbtn-main:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(129,140,248,.4)}
.sbtn-retry{background:rgba(255,255,255,.05);color:rgba(240,240,240,.35);border:1px solid rgba(255,255,255,.09)}
.sbtn-retry:hover{background:rgba(255,255,255,.09);color:rgba(240,240,240,.6)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:100;letter-spacing:.5px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <span class="hicon">🎾</span>
    <div class="brand">S · E · M · T</div>
    <h1>테니스 <span class="grad">MBTI</span></h1>
    <p>12가지 질문으로 나의 코트 위 성격 유형을 알아보세요<br>총 16가지 유형 중 당신은 어떤 플레이어?</p>
  </div>

  <div class="axes">
    <span class="ax ax-ad">⚔️ 공격 vs 수비</span>
    <span class="ax ax-pc">💥 파워 vs 컨트롤</span>
    <span class="ax ax-bn">🏃 베이스 vs 네트</span>
    <span class="ax ax-er">❤️ 감성 vs 이성</span>
  </div>

  <!-- QUIZ -->
  <div id="quizWrap">
    <div class="prog-wrap">
      <div class="prog-top"><span id="progTxt">1 / 12</span><span id="progPct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-axis-badge" id="axisBadge"></div>
      <div class="q-text" id="qText"></div>
      <div class="opts" id="opts"></div>
    </div>
    <div class="nav">
      <button class="nbtn nprev" id="btnPrev" onclick="prev()">← 이전</button>
      <button class="nbtn nnext" id="btnNext" onclick="next()" disabled>다음 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result" id="resultWrap">
    <div class="type-card" id="typeCard">
      <div class="tc-brand">S · E · M · T TENNIS MBTI</div>
      <div class="tc-code" id="tcCode"></div>
      <div class="tc-emoji" id="tcEmoji"></div>
      <div class="tc-name" id="tcName"></div>
      <div class="tc-hero" id="tcHero"></div>
      <div class="tc-desc" id="tcDesc"></div>
    </div>
    <div class="axis-result" id="axisResult"></div>
    <div class="sw-grid" id="swGrid"></div>
    <div class="compat-card">
      <div class="compat-title">🤝 &nbsp;궁합 좋은 파트너 유형</div>
      <div class="compat-row" id="compatRow"></div>
    </div>
    <div class="famous-card">
      <div class="famous-title">🌟 &nbsp;비슷한 스타일의 선수들</div>
      <div class="famous-list" id="famousList"></div>
    </div>
    <button class="sbtn sbtn-main" onclick="copyResult()">📋 &nbsp; 카톡에 공유하기</button>
    <button class="sbtn sbtn-retry" onclick="retryQuiz()">↺ &nbsp; 다시 테스트하기</button>
  </div>
</div>
<div class="toast" id="toast">📋 복사됐습니다! 카톡에 붙여넣기 하세요</div>

<script>
// ── 질문 데이터 ────────────────────────────────
// 각 질문: axis(A/D/P/C/B/N/E/R), a = 첫 번째 축 선택, b = 두 번째 축 선택
const Qs = [
  // ── A vs D ──
  {axis:'AD', badge:'⚔️ 공격 vs 수비', color:'#f59e0b', bg:'rgba(245,158,11,.12)',
   text:'긴 랠리 중 짧은 공이 왔다! 나는?',
   a:{txt:'바로 강하게 공격해서 위너를 노린다', val:'A'},
   b:{txt:'한 번 더 안정적으로 넣고 기회를 기다린다', val:'D'}},
  {axis:'AD', badge:'⚔️ 공격 vs 수비', color:'#f59e0b', bg:'rgba(245,158,11,.12)',
   text:'듀스 상황, 나의 전략은?',
   a:{txt:'과감하게 위너를 노린다. 지면 어쩔 수 없다', val:'A'},
   b:{txt:'실수 없이 안정적으로, 상대 에러를 기다린다', val:'D'}},
  {axis:'AD', badge:'⚔️ 공격 vs 수비', color:'#f59e0b', bg:'rgba(245,158,11,.12)',
   text:'내가 생각하는 이상적인 득점 방법은?',
   a:{txt:'내가 직접 위너로 끝내는 화끈한 득점', val:'A'},
   b:{txt:'상대를 지치게 만들어 스스로 실수하게 유도', val:'D'}},

  // ── P vs C ──
  {axis:'PC', badge:'💥 파워 vs 컨트롤', color:'#10b981', bg:'rgba(16,185,129,.12)',
   text:'나의 샷 특징을 한마디로 표현하면?',
   a:{txt:'강하고 빠른 공. 속도로 압도한다', val:'P'},
   b:{txt:'정교하고 코스 좋은 공. 빈 공간을 노린다', val:'C'}},
  {axis:'PC', badge:'💥 파워 vs 컨트롤', color:'#10b981', bg:'rgba(16,185,129,.12)',
   text:'실수가 주로 생기는 이유는?',
   a:{txt:'너무 세게 쳐서 아웃이나 네트가 잦다', val:'P'},
   b:{txt:'코스를 너무 노리다 걸리거나 짧아진다', val:'C'}},
  {axis:'PC', badge:'💥 파워 vs 컨트롤', color:'#10b981', bg:'rgba(16,185,129,.12)',
   text:'꿈에 그리는 완벽한 드림 샷은?',
   a:{txt:'상대가 손도 못 대는 강력한 에이스 서브 또는 위너', val:'P'},
   b:{txt:'상대를 좌우로 흔든 뒤 빈 코트를 향한 정교한 마무리', val:'C'}},

  // ── B vs N ──
  {axis:'BN', badge:'🏃 베이스라인 vs 네트', color:'#818cf8', bg:'rgba(129,140,248,.12)',
   text:'복식에서 내가 선호하는 포지션은?',
   a:{txt:'베이스라인. 뒤에서 안정적으로 볼을 올려준다', val:'B'},
   b:{txt:'네트 앞. 포치하며 적극적으로 마무리한다', val:'N'}},
  {axis:'BN', badge:'🏃 베이스라인 vs 네트', color:'#818cf8', bg:'rgba(129,140,248,.12)',
   text:'상대가 약한 공을 보내왔을 때 나는?',
   a:{txt:'베이스라인에서 강하게 때려 상대 코트 깊숙이 꽂는다', val:'B'},
   b:{txt:'네트로 달려가서 발리로 깔끔하게 마무리한다', val:'N'}},
  {axis:'BN', badge:'🏃 베이스라인 vs 네트', color:'#818cf8', bg:'rgba(129,140,248,.12)',
   text:'내가 생각하는 이상적인 플레이 스타일은?',
   a:{txt:'뒤에서 끈질기게 버티다가 결정적인 기회를 낚아챈다', val:'B'},
   b:{txt:'빠르게 앞으로 치고 나가 상대를 시간적으로 압박한다', val:'N'}},

  // ── E vs R ──

  {axis:'ER', badge:'❤️ 감성 vs 이성', color:'#ec4899', bg:'rgba(236,72,153,.12)',

// ── 16가지 유형 ────────────────────────────────
const TYPES = {
  APBE:{emoji:'🔥',name:'폭발형 파이터',hero:'Rafael Nadal 스타일',

    compat:['DCBR','ACNR'],
    famous:['라파엘 나달','지미 코너스','앤디 머레이']},

  APBR:{emoji:'⚡',name:'냉혈 포식자',hero:'Ivan Lendl 스타일',
    color:'#f59e0b',grad:'linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.08))',border:'rgba(245,158,11,.3)',

// ── 퀴즈 상태 ──────────────────────────────────
let cur = 0;
let ans = new Array(Qs.length).fill(null); // 'A' or 'B'

function render() {
  const q = Qs[cur];
  document.getElementById('axisBadge').textContent = q.badge;
  document.getElementById('axisBadge').style.cssText = `color:${q.color};background:${q.bg};padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px`;
  document.getElementById('qText').textContent = q.text;

  const pct = Math.round(cur / Qs.length * 100);
  document.getElementById('progTxt').textContent = `${cur+1} / ${Qs.length}`;
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';

  document.getElementById('opts').innerHTML = [
    {data: q.a, val: 'A'},
    {data: q.b, val: 'B'},
  ].map(o => `
    <div class="opt ${ans[cur]===o.val?'sel':''}" onclick="pick('${o.val}')">
      <div class="opt-circle"></div>
      <div class="opt-txt">${o.data.txt}</div>
    </div>`).join('');

  document.getElementById('btnPrev').style.visibility = cur===0?'hidden':'visible';
  document.getElementById('btnNext').disabled = ans[cur]===null;
  document.getElementById('btnNext').textContent = cur===Qs.length-1 ? '결과 보기 🎾' : '다음 →';
}

function pick(v) {
  ans[cur] = v;
  document.querySelectorAll('.opt').forEach((el,i) => el.classList.toggle('sel', i===(v==='A'?0:1)));
  document.getElementById('btnNext').disabled = false;
}

function next() {
  if(ans[cur]===null) return;
  if(cur===Qs.length-1) { showResult(); return; }
  cur++; render();
}
function prev() {
  if(cur===0) return;
  cur--; render();
}

// ── 결과 계산 ──────────────────────────────────
function showResult() {
  // 각 축 점수 집계
  const scores = {A:0,D:0,P:0,C:0,B:0,N:0,E:0,R:0};
  Qs.forEach((q,i) => {
    const picked = ans[i]; // 'A' or 'B'
    // axis: 'AD','PC','BN','ER'
    if(q.axis==='AD') picked==='A' ? scores.A++ : scores.D++;
    if(q.axis==='PC') picked==='A' ? scores.P++ : scores.C++;
    if(q.axis==='BN') picked==='A' ? scores.B++ : scores.N++;
    if(q.axis==='ER') picked==='A' ? scores.E++ : scores.R++;
  });

  const code = 
    (scores.A>=scores.D?'A':'D') +
    (scores.P>=scores.C?'P':'C') +
    (scores.B>=scores.N?'B':'N') +
    (scores.E>=scores.R?'E':'R');

  const type = TYPES[code] || TYPES['ACBR'];

  // 헤더 카드
  document.getElementById('typeCard').style.background = type.grad;
  document.getElementById('typeCard').style.border = `1px solid ${type.border}`;
  document.getElementById('tcCode').textContent = code;
  document.getElementById('tcCode').style.color = type.color;
  document.getElementById('tcEmoji').textContent = type.emoji;
  document.getElementById('tcName').textContent = type.name;
  document.getElementById('tcHero').textContent = '✦ ' + type.hero + ' ✦';
  document.getElementById('tcDesc').textContent = type.desc;

  // 축 결과 bars
  const axData = [
    {a:'A',b:'D',an:'공격',bn:'수비',sa:scores.A,sb:scores.D,color:'#f59e0b'},
    {a:'P',b:'C',an:'파워',bn:'컨트롤',sa:scores.P,sb:scores.C,color:'#10b981'},
    {a:'B',b:'N',an:'베이스',bn:'네트',sa:scores.B,sb:scores.N,color:'#818cf8'},
    {a:'E',b:'R',an:'감성',bn:'이성',sa:scores.E,sb:scores.R,color:'#ec4899'},
  ];
  document.getElementById('axisResult').innerHTML = axData.map(d => {
    const total = d.sa + d.sb;
    const pA = Math.round(d.sa/total*100);
    const win = d.sa >= d.sb ? d.an : d.bn;
    return `<div class="ar-item">
      <div class="ar-labels">
        <span class="ar-lbl" style="color:${d.color}">${d.an} ${d.sa*10}%</span>
        <span class="ar-lbl" style="color:rgba(240,240,240,.35)">${d.bn} ${d.sb*10}%</span>
      </div>
      <div class="ar-bar-bg"><div class="ar-bar-fill" style="width:${pA}%;background:${d.color}"></div></div>
      <div class="ar-result" style="color:${d.color}">→ ${win}형</div>
    </div>`;
  }).join('');

  // 강점/약점
  document.getElementById('swGrid').innerHTML = `
    <div class="sw-card">
      <div class="sw-title" style="color:#10b981">💪 강점</div>
      <div class="sw-list">${type.strengths.map(s=>`<div class="sw-item"><span class="sw-dot">✦</span><span>${s}</span></div>`).join('')}</div>
    </div>
    <div class="sw-card">
      <div class="sw-title" style="color:#f87171">⚠️ 약점</div>
      <div class="sw-list">${type.weaknesses.map(w=>`<div class="sw-item"><span class="sw-dot">▸</span><span>${w}</span></div>`).join('')}</div>
    </div>`;

  // 궁합
  document.getElementById('compatRow').innerHTML = type.compat.map(c => {
    const ct = TYPES[c];
    return `<div class="compat-item">
      <div class="compat-code" style="color:${ct?.color||'#fff'}">${c}</div>
      <div style="font-size:18px">${ct?.emoji||'🎾'}</div>
      <div class="compat-lbl">${ct?.name||c}</div>
    </div>`;
  }).join('');

  // 유명 선수
  document.getElementById('famousList').innerHTML = type.famous.map(f =>
    `<div class="famous-chip">${f}</div>`).join('');

  document.getElementById('quizWrap').style.display = 'none';
  const r = document.getElementById('resultWrap');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth'});

  // 공유용 저장
  window._result = {code, type};
}

function retryQuiz() {
  cur = 0; ans = new Array(Qs.length).fill(null);
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('quizWrap').style.display = 'block';
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function copyResult() {
  if(!window._result) return;
  const {code, type} = window._result;
  const text = [
    `🎾 S.E.M.T 테니스 MBTI 결과`,``,
    `나의 유형: ${code} ${type.emoji} ${type.name}`,
    `(${type.hero})`,``,
    type.desc,``,
    `💪 강점`,
    ...type.strengths.map(s=>`• ${s}`),``,
    `✦ 나의 코트 위 성격은 ${code}형!`,
    `나는 어떤 유형?`,
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  });
}

// init
render();
</script>
</body>
</html>
