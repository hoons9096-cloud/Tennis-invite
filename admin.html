<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대회 본부 - 스코어 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0C0C0E;color:#E8E8E8;min-height:100vh}
.header{background:#151518;border-bottom:2px solid #D2FF4E;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:800;color:#D2FF4E}
.header .badge{background:#D2FF4E;color:#0C0C0E;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.container{max-width:1200px;margin:0 auto;padding:16px}

/* Court cards */
.courts{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:20px}
.court{background:#151518;border:1px solid #2A2A30;border-radius:12px;overflow:hidden;transition:all .3s}
.court.active{border-color:#D2FF4E;box-shadow:0 0 20px rgba(210,255,78,.08)}
.court-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#1C1C20}
.court-name{font-size:14px;font-weight:800;color:#D2FF4E}
.court-event{font-size:11px;color:#707075;font-weight:600}
.court-status{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:700}
.court-status.live{background:rgba(255,60,60,.15);color:#FF4444;animation:pulse 2s infinite}
.court-status.done{background:rgba(210,255,78,.1);color:#D2FF4E}
.court-status.waiting{background:rgba(112,112,117,.15);color:#707075}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.court-body{padding:16px}
.team-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.team-name-input{background:#1C1C20;border:1px solid #2A2A30;border-radius:8px;color:#E8E8E8;font-size:14px;font-weight:600;padding:8px 12px;width:55%;font-family:inherit}
.team-name-input:focus{outline:none;border-color:#D2FF4E}
.score-controls{display:flex;align-items:center;gap:6px}
.score-btn{width:36px;height:36px;border-radius:8px;border:none;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.score-btn.minus{background:#2A2A30;color:#FF6B6B}.score-btn.minus:hover{background:#3A2020}
.score-btn.plus{background:#1A2A10;color:#D2FF4E}.score-btn.plus:hover{background:#2A3A18}
.score-display{font-size:28px;font-weight:900;color:#FFFFFF;min-width:44px;text-align:center;font-family:'Noto Sans KR',monospace}
.vs-divider{text-align:center;color:#2A2A30;font-size:12px;font-weight:700;padding:2px 0}

/* Event selector */
.event-row{display:flex;gap:6px;padding:12px 16px;border-top:1px solid #1C1C20}
.event-chip{flex:1;text-align:center;padding:6px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #2A2A30;color:#707075;transition:all .2s}
.event-chip.selected{background:rgba(210,255,78,.1);border-color:#D2FF4E;color:#D2FF4E}

/* Action buttons */
.court-actions{display:flex;gap:8px;padding:0 16px 12px}
.action-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.action-btn.start{background:#1A3A10;color:#D2FF4E;border:1px solid #2A4A18}
.action-btn.start:hover{background:#2A4A18}
.action-btn.finish{background:#3A1A10;color:#FF6B6B;border:1px solid #4A2A18}
.action-btn.finish:hover{background:#4A2A18}
.action-btn.reset{background:#1C1C20;color:#707075;border:1px solid #2A2A30}
.action-btn.reset:hover{background:#2A2A30}

/* Quick setup */
.setup-section{background:#151518;border:1px solid #2A2A30;border-radius:12px;padding:20px;margin-bottom:16px}
.setup-title{font-size:14px;font-weight:800;color:#D2FF4E;margin-bottom:12px}
.setup-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.setup-btn{padding:8px 16px;border-radius:8px;border:1px solid #2A2A30;background:#1C1C20;color:#E8E8E8;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.setup-btn:hover{border-color:#D2FF4E;color:#D2FF4E}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#D2FF4E;color:#0C0C0E;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}

/* Tabs */
.admin-tabs{display:flex;gap:4px;margin-bottom:16px}
.admin-tab{padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #2A2A30;color:#707075;background:transparent;transition:all .2s;font-family:inherit}
.admin-tab.active{background:#D2FF4E;color:#0C0C0E;border-color:#D2FF4E}
.admin-section{display:none}.admin-section.active{display:block}

/* Results management */
.result-card{background:#151518;border:1px solid #2A2A30;border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.result-card:hover{border-color:#D2FF4E}
.result-info{flex:1;min-width:200px}
.result-meta{font-size:10px;color:#707075;margin-bottom:4px}
.result-match{font-size:14px;font-weight:600;color:#E8E8E8}
.result-score-edit{display:flex;align-items:center;gap:6px}
.result-score-input{width:50px;text-align:center;background:#1C1C20;border:1px solid #2A2A30;border-radius:6px;color:#FFFFFF;font-size:20px;font-weight:900;padding:6px;font-family:inherit}
.result-score-input:focus{outline:none;border-color:#D2FF4E}
.result-colon{font-size:20px;font-weight:900;color:#707075}
.result-actions{display:flex;gap:6px}
.result-btn{padding:6px 14px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.result-btn.save{background:#1A3A10;color:#D2FF4E;border:1px solid #2A4A18}
.result-btn.save:hover{background:#2A4A18}
.result-btn.delete{background:#3A1A10;color:#FF6B6B;border:1px solid #4A2A18}
.result-btn.delete:hover{background:#4A2A18}
.result-empty{text-align:center;padding:40px;color:#707075;font-size:13px}

/* Schedule / Court Assignment */
.sched-time{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sched-time-label{font-size:13px;font-weight:700;color:#D2FF4E}
.sched-time-input{background:#1C1C20;border:1px solid #2A2A30;border-radius:8px;color:#E8E8E8;font-size:14px;font-weight:600;padding:8px 12px;width:120px;font-family:inherit}
.sched-time-input:focus{outline:none;border-color:#D2FF4E}
.sched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.sched-card{background:#151518;border:1px solid #2A2A30;border-radius:10px;padding:12px;transition:all .2s}
.sched-card:hover{border-color:#D2FF4E}
.sched-court-name{font-size:12px;font-weight:800;color:#D2FF4E;margin-bottom:8px}
.sched-input{width:100%;background:#1C1C20;border:1px solid #2A2A30;border-radius:6px;color:#E8E8E8;font-size:12px;padding:6px 10px;font-family:inherit;margin-bottom:4px}
.sched-input:focus{outline:none;border-color:#D2FF4E}
.sched-select{width:100%;background:#1C1C20;border:1px solid #2A2A30;border-radius:6px;color:#E8E8E8;font-size:11px;padding:5px 8px;font-family:inherit;margin-bottom:4px}
.sched-actions{display:flex;gap:6px;margin-top:12px}

/* Standings */
.standings-group{background:#151518;border:1px solid #2A2A30;border-radius:12px;margin-bottom:16px;overflow:hidden}
.standings-group-header{background:#1C1C20;padding:10px 16px;font-size:13px;font-weight:800;color:#D2FF4E}
.standings-table{width:100%;border-collapse:collapse}
.standings-table th{font-size:10px;font-weight:700;color:#707075;padding:8px 10px;text-align:center;border-bottom:1px solid #2A2A30;letter-spacing:1px}
.standings-table td{font-size:13px;padding:8px 10px;text-align:center;border-bottom:1px solid #1C1C20}
.standings-table tr:hover td{background:#1A1A1E}
.standings-rank{font-weight:900;color:#D2FF4E;font-size:15px}
.standings-team{font-weight:700;color:#E8E8E8;text-align:left!important}
.standings-win{color:#D2FF4E;font-weight:700}
.standings-lose{color:#FF6B6B;font-weight:700}
.standings-qualify{background:rgba(210,255,78,.04)!important}
</style>
</head>
<body>

<div class="header">
  <h1>🎾 대회 본부 - 스코어 관리</h1>
  <span class="badge">ADMIN</span>
</div>

<div class="container">
  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('teams',this)">팀 등록</button>
    <button class="admin-tab" onclick="switchTab('courts',this)">코트 관리</button>
    <button class="admin-tab" onclick="switchTab('schedule',this)">코트 배정</button>
    <button class="admin-tab" onclick="switchTab('standings',this)">순위표</button>
    <button class="admin-tab" onclick="switchTab('results',this)">경기 결과</button>
  </div>

  <!-- Tab 0: Team Registration -->
  <div class="admin-section active" id="sec-teams">
    <div class="setup-section">
      <div class="setup-title">참가팀 등록</div>
      <p style="font-size:12px;color:#707075;margin-bottom:12px">대회 시작 전에 참가팀을 등록하면, 코트 관리·배정에서 드롭다운으로 선택할 수 있습니다</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <!-- A조 -->
      <div class="setup-section" style="margin-bottom:0">
        <div class="setup-title">A조</div>
        <div id="groupA-inputs"></div>
        <div style="margin-top:8px">
          <button class="setup-btn" onclick="addTeamInput('A')">+ 팀 추가</button>
        </div>
      </div>
      <!-- B조 -->
      <div class="setup-section" style="margin-bottom:0">
        <div class="setup-title">B조</div>
        <div id="groupB-inputs"></div>
        <div style="margin-top:8px">
          <button class="setup-btn" onclick="addTeamInput('B')">+ 팀 추가</button>
        </div>
      </div>
    </div>

    <div class="setup-row">
      <button class="setup-btn" onclick="saveTeams()" style="background:#1A3A10;color:#D2FF4E;border-color:#2A4A18;padding:10px 30px;font-size:13px">팀 등록 저장</button>
      <button class="setup-btn" onclick="loadDefaultTeams()">기본 팀 불러오기 (영남A,B,C + 초청1~5)</button>
    </div>

    <div style="margin-top:16px">
      <div class="setup-title" style="font-size:12px">등록된 팀 목록</div>
      <div id="registeredTeams" style="font-size:12px;color:#707075;padding:8px 0">아직 등록된 팀이 없습니다</div>
    </div>
  </div>

  <!-- Tab 1: Courts -->
  <div class="admin-section" id="sec-courts">
    <div class="setup-section">
      <div class="setup-title">빠른 설정</div>
      <div class="setup-row">
        <button class="setup-btn" onclick="initCourts(5)">5코트 초기화</button>
        <button class="setup-btn" onclick="resetAll()">전체 리셋</button>
      </div>
    </div>
    <div class="courts" id="courts"></div>
  </div>

  <!-- Tab 2: Court Assignment -->
  <div class="admin-section" id="sec-schedule">
    <div class="setup-section">
      <div class="setup-title">코트 배정 현황판</div>
      <p style="font-size:12px;color:#707075;margin-bottom:12px">다음 타임 경기를 미리 배정하면 관중 페이지에 실시간 표시됩니다</p>
      <div class="sched-time">
        <span class="sched-time-label">현재 타임:</span>
        <input class="sched-time-input" id="currentRound" placeholder="예: 3타임" onchange="updateScheduleMeta('currentRound',this.value)">
        <span class="sched-time-label" style="margin-left:12px">다음 타임:</span>
        <input class="sched-time-input" id="nextRound" placeholder="예: 4타임" onchange="updateScheduleMeta('nextRound',this.value)">
      </div>
    </div>
    <div class="setup-section" style="margin-bottom:0">
      <div class="setup-title">다음 타임 코트 배정</div>
    </div>
    <div class="sched-grid" id="schedGrid"></div>
    <div class="sched-actions">
      <button class="setup-btn" onclick="clearSchedule()">배정 초기화</button>
      <button class="setup-btn" onclick="applySchedule()" style="background:#1A3A10;color:#D2FF4E;border-color:#2A4A18">배정 → 코트에 적용</button>
    </div>
  </div>

  <!-- Tab 3: Standings -->
  <div class="admin-section" id="sec-standings">
    <div class="setup-section">
      <div class="setup-title">조별 순위표 (자동 계산)</div>
      <p style="font-size:12px;color:#707075;margin-bottom:8px">경기 결과를 기반으로 자동 계산됩니다 · 상위 2팀 본선 진출 · 팀 등록 탭에서 조 편성</p>
    </div>
    <div id="standingsArea"></div>
  </div>

  <!-- Tab 4: Results -->
  <div class="admin-section" id="sec-results">
    <div class="setup-section">
      <div class="setup-title">경기 결과 관리</div>
      <p style="font-size:12px;color:#707075;margin-bottom:8px">점수를 수정하거나 잘못된 결과를 삭제할 수 있습니다</p>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBLEGto1SK7JiowYJJCuBCfpBsjrkiqklM",
  authDomain: "tennis-score-a3654.firebaseapp.com",
  databaseURL: "https://tennis-score-a3654-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tennis-score-a3654",
  storageBucket: "tennis-score-a3654.firebasestorage.app",
  messagingSenderId: "361320303748",
  appId: "1:361320303748:web:0238102b53e7209cef86d1"
});

var db = firebase.database();
var courtsRef = db.ref('courts');
var resultsRef = db.ref('results');
var teamsRef = db.ref('teams');

var events = ['남복','혼복','여복'];
var allTeams = []; // populated from Firebase

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2000);
}

// ============ TEAM REGISTRATION ============
function addTeamInput(group){
  var container = document.getElementById('group'+group+'-inputs');
  var idx = container.children.length + 1;
  var div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
  div.innerHTML = '<input class="team-name-input" style="width:100%" placeholder="팀 이름 입력" id="team-'+group+'-'+idx+'">'
    +'<button class="setup-btn" style="padding:6px 10px;font-size:11px;color:#FF6B6B" onclick="this.parentElement.remove()">✕</button>';
  container.appendChild(div);
}

function loadDefaultTeams(){
  var aContainer = document.getElementById('groupA-inputs');
  var bContainer = document.getElementById('groupB-inputs');
  aContainer.innerHTML = '';
  bContainer.innerHTML = '';
  ['영남A','영남B','초청1','초청2'].forEach(function(t,i){
    var div = document.createElement('div');
    div.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
    div.innerHTML = '<input class="team-name-input" style="width:100%" value="'+t+'" id="team-A-'+(i+1)+'">'
      +'<button class="setup-btn" style="padding:6px 10px;font-size:11px;color:#FF6B6B" onclick="this.parentElement.remove()">✕</button>';
    aContainer.appendChild(div);
  });
  ['영남C','초청3','초청4','초청5'].forEach(function(t,i){
    var div = document.createElement('div');
    div.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
    div.innerHTML = '<input class="team-name-input" style="width:100%" value="'+t+'" id="team-B-'+(i+1)+'">'
      +'<button class="setup-btn" style="padding:6px 10px;font-size:11px;color:#FF6B6B" onclick="this.parentElement.remove()">✕</button>';
    bContainer.appendChild(div);
  });
  toast('기본 팀 불러오기 완료');
}

function saveTeams(){
  var groupA = [];
  var groupB = [];
  document.querySelectorAll('#groupA-inputs input').forEach(function(inp){
    if(inp.value.trim()) groupA.push(inp.value.trim());
  });
  document.querySelectorAll('#groupB-inputs input').forEach(function(inp){
    if(inp.value.trim()) groupB.push(inp.value.trim());
  });
  if(groupA.length===0 && groupB.length===0){toast('팀 이름을 입력해주세요');return}
  
  var teamsData = {A:{},B:{}};
  groupA.forEach(function(t){teamsData.A[t]=t});
  groupB.forEach(function(t){teamsData.B[t]=t});
  teamsRef.set(teamsData);
  
  // Also update groups for standings
  var groupsData = {
    A:{name:'A조',teams:teamsData.A},
    B:{name:'B조',teams:teamsData.B}
  };
  db.ref('groups').set(groupsData);
  
  toast('팀 등록 완료! (A조 '+groupA.length+'팀, B조 '+groupB.length+'팀)');
}

function teamSelectOptions(selectedValue){
  var html = '<option value="">선택</option>';
  allTeams.forEach(function(t){
    html += '<option value="'+t+'"'+(t===selectedValue?' selected':'')+'>'+t+'</option>';
  });
  return html;
}

// Listen for team changes
teamsRef.on('value',function(snap){
  var data = snap.val();
  allTeams = [];
  var displayHtml = '';
  if(data){
    if(data.A){
      var aTeams = Object.values(data.A);
      allTeams = allTeams.concat(aTeams);
      displayHtml += '<span style="color:#D2FF4E;font-weight:700">A조:</span> '+aTeams.join(', ')+'<br>';
    }
    if(data.B){
      var bTeams = Object.values(data.B);
      allTeams = allTeams.concat(bTeams);
      displayHtml += '<span style="color:#D2FF4E;font-weight:700">B조:</span> '+bTeams.join(', ');
    }
  }
  var el = document.getElementById('registeredTeams');
  if(el) el.innerHTML = displayHtml || '아직 등록된 팀이 없습니다';
  
  // Load team inputs if empty
  var aContainer = document.getElementById('groupA-inputs');
  if(aContainer && aContainer.children.length===0 && data){
    if(data.A) Object.values(data.A).forEach(function(t,i){
      var div = document.createElement('div');
      div.style.cssText='display:flex;gap:6px;margin-bottom:6px';
      div.innerHTML='<input class="team-name-input" style="width:100%" value="'+t+'">'
        +'<button class="setup-btn" style="padding:6px 10px;font-size:11px;color:#FF6B6B" onclick="this.parentElement.remove()">✕</button>';
      aContainer.appendChild(div);
    });
    if(data.B){
      var bContainer = document.getElementById('groupB-inputs');
      Object.values(data.B).forEach(function(t,i){
        var div = document.createElement('div');
        div.style.cssText='display:flex;gap:6px;margin-bottom:6px';
        div.innerHTML='<input class="team-name-input" style="width:100%" value="'+t+'">'
          +'<button class="setup-btn" style="padding:6px 10px;font-size:11px;color:#FF6B6B" onclick="this.parentElement.remove()">✕</button>';
        bContainer.appendChild(div);
      });
    }
  }
});

function initCourts(n){
  if(!confirm(n+'코트로 초기화하시겠습니까?')) return;
  var data={};
  for(var i=1;i<=n;i++){
    data['court'+i]={
      name:'코트 '+i,
      teamA:'',teamB:'',
      scoreA:0,scoreB:0,
      event:'남복',group:'',
      status:'waiting' // waiting, live, done
    };
  }
  courtsRef.set(data);
  toast(n+'코트 초기화 완료!');
}

function resetAll(){
  if(!confirm('모든 데이터를 리셋하시겠습니까?')) return;
  courtsRef.remove();
  resultsRef.remove();
  document.getElementById('courts').innerHTML='<p style="color:#707075;text-align:center;padding:40px">코트를 초기화해주세요</p>';
  toast('전체 리셋 완료');
}

function updateCourt(courtId, field, value){
  courtsRef.child(courtId).child(field).set(value);
}

function changeScore(courtId, team, delta){
  courtsRef.child(courtId).child('score'+team).transaction(function(current){
    var val = (current||0)+delta;
    return val<0?0:val;
  });
}

function startMatch(courtId){
  courtsRef.child(courtId).update({status:'live',scoreA:0,scoreB:0});
  toast('경기 시작!');
}

function finishMatch(courtId){
  courtsRef.child(courtId).once('value',function(snap){
    var d=snap.val();
    if(!d) return;
    // Save result
    resultsRef.push({
      court:d.name,
      teamA:d.teamA,teamB:d.teamB,
      scoreA:d.scoreA,scoreB:d.scoreB,
      event:d.event,group:d.group,
      time:new Date().toLocaleTimeString('ko-KR'),
      timestamp:firebase.database.ServerValue.TIMESTAMP
    });
    courtsRef.child(courtId).update({status:'done'});
    toast(d.teamA+' '+d.scoreA+':'+d.scoreB+' '+d.teamB+' 결과 저장!');
  });
}

function resetCourt(courtId){
  courtsRef.child(courtId).update({
    teamA:'',teamB:'',scoreA:0,scoreB:0,event:'남복',group:'',status:'waiting'
  });
}

function renderCourt(courtId, data){
  var statusClass = data.status==='live'?'live':data.status==='done'?'done':'waiting';
  var statusText = data.status==='live'?'LIVE':data.status==='done'?'종료':'대기';
  
  return '<div class="court '+(data.status==='live'?'active':'')+'" id="'+courtId+'">'
    +'<div class="court-header">'
    +'<span class="court-name">'+data.name+'</span>'
    +'<span class="court-status '+statusClass+'">'+statusText+'</span>'
    +'</div>'
    +'<div class="court-body">'
    // Team A
    +'<div class="team-row">'
    +'<select class="team-name-input" onchange="updateCourt(\''+courtId+'\',\'teamA\',this.value)">'
    +teamSelectOptions(data.teamA)
    +'</select>'
    +'<div class="score-controls">'
    +'<button class="score-btn minus" onclick="changeScore(\''+courtId+'\',\'A\',-1)">−</button>'
    +'<span class="score-display">'+(data.scoreA||0)+'</span>'
    +'<button class="score-btn plus" onclick="changeScore(\''+courtId+'\',\'A\',1)">+</button>'
    +'</div></div>'
    // VS
    +'<div class="vs-divider">VS</div>'
    // Team B
    +'<div class="team-row">'
    +'<select class="team-name-input" onchange="updateCourt(\''+courtId+'\',\'teamB\',this.value)">'
    +teamSelectOptions(data.teamB)
    +'</select>'
    +'<div class="score-controls">'
    +'<button class="score-btn minus" onclick="changeScore(\''+courtId+'\',\'B\',-1)">−</button>'
    +'<span class="score-display">'+(data.scoreB||0)+'</span>'
    +'<button class="score-btn plus" onclick="changeScore(\''+courtId+'\',\'B\',1)">+</button>'
    +'</div></div>'
    +'</div>'
    // Event selector
    +'<div class="event-row">'
    +events.map(function(e){
      return '<div class="event-chip '+(data.event===e?'selected':'')+'" onclick="updateCourt(\''+courtId+'\',\'event\',\''+e+'\')">'+e+'</div>';
    }).join('')
    +'</div>'
    // Group input
    +'<div style="padding:0 16px 8px">'
    +'<input class="team-name-input" style="width:100%;font-size:12px" placeholder="조/라운드 (예: A조 1R)" value="'+(data.group||'')+'" onchange="updateCourt(\''+courtId+'\',\'group\',this.value)">'
    +'</div>'
    // Actions
    +'<div class="court-actions">'
    +'<button class="action-btn start" onclick="startMatch(\''+courtId+'\')">경기 시작</button>'
    +'<button class="action-btn finish" onclick="finishMatch(\''+courtId+'\')">경기 종료</button>'
    +'<button class="action-btn reset" onclick="resetCourt(\''+courtId+'\')">리셋</button>'
    +'</div>'
    +'</div>';
}

// Listen for changes
courtsRef.on('value',function(snap){
  var data=snap.val();
  var container=document.getElementById('courts');
  if(!data){
    container.innerHTML='<p style="color:#707075;text-align:center;padding:40px">코트를 초기화해주세요</p>';
    return;
  }
  var html='';
  Object.keys(data).sort().forEach(function(key){
    html+=renderCourt(key,data[key]);
  });
  container.innerHTML=html;
});

// Tab switching
function switchTab(tab,btn){
  document.querySelectorAll('.admin-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.admin-section').forEach(function(s){s.classList.remove('active')});
  document.getElementById('sec-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ============ SCHEDULE (코트 배정) ============
var schedRef = db.ref('schedule');

function updateScheduleMeta(field,value){
  schedRef.child('meta').child(field).set(value);
  toast('타임 정보 업데이트');
}

function updateScheduleCourt(courtNum,field,value){
  schedRef.child('next').child('court'+courtNum).child(field).set(value);
}

function clearSchedule(){
  if(!confirm('다음 타임 배정을 초기화하시겠습니까?')) return;
  schedRef.child('next').remove();
  toast('배정 초기화 완료');
}

function applySchedule(){
  if(!confirm('배정된 내용을 코트에 적용하시겠습니까?\n(현재 코트의 팀/종목이 교체됩니다)')) return;
  schedRef.child('next').once('value',function(snap){
    var data=snap.val();
    if(!data){toast('배정된 내용이 없습니다');return}
    Object.keys(data).forEach(function(courtKey){
      var s=data[courtKey];
      courtsRef.child(courtKey).update({
        teamA:s.teamA||'', teamB:s.teamB||'',
        event:s.event||'남복', group:s.group||'',
        scoreA:0, scoreB:0, status:'waiting'
      });
    });
    // Move next round to current
    schedRef.child('meta').once('value',function(ms){
      var m=ms.val()||{};
      if(m.nextRound) schedRef.child('meta').child('currentRound').set(m.nextRound);
    });
    toast('코트에 적용 완료! 코트 관리 탭에서 경기 시작하세요');
  });
}

// Render schedule grid
function renderScheduleGrid(numCourts){
  schedRef.child('next').on('value',function(snap){
    var data=snap.val()||{};
    var html='';
    for(var i=1;i<=numCourts;i++){
      var c=data['court'+i]||{};
      html+='<div class="sched-card">'
        +'<div class="sched-court-name">코트 '+i+'</div>'
        +'<select class="sched-input" onchange="updateScheduleCourt('+i+',\'teamA\',this.value)">'+teamSelectOptions(c.teamA)+'</select>'
        +'<select class="sched-input" onchange="updateScheduleCourt('+i+',\'teamB\',this.value)">'+teamSelectOptions(c.teamB)+'</select>'
        +'<select class="sched-select" onchange="updateScheduleCourt('+i+',\'event\',this.value)">'
        +'<option'+(c.event==='남복'?' selected':'')+'>남복</option>'
        +'<option'+(c.event==='혼복'?' selected':'')+'>혼복</option>'
        +'<option'+(c.event==='여복'?' selected':'')+'>여복</option>'
        +'</select>'
        +'<input class="sched-input" placeholder="조/라운드" value="'+(c.group||'')+'" onchange="updateScheduleCourt('+i+',\'group\',this.value)">'
        +'</div>';
    }
    document.getElementById('schedGrid').innerHTML=html;
  });
}

// Load schedule meta
schedRef.child('meta').on('value',function(snap){
  var m=snap.val()||{};
  var cr=document.getElementById('currentRound');
  var nr=document.getElementById('nextRound');
  if(cr) cr.value=m.currentRound||'';
  if(nr) nr.value=m.nextRound||'';
});

// ============ STANDINGS (순위표) ============
var groupsRef = db.ref('groups');

function initGroups(){
  if(!confirm('조 편성을 초기화하시겠습니까?')) return;
  groupsRef.set({
    A:{name:'A조',teams:{'영남A':'영남A','영남B':'영남B','초청1':'초청1','초청2':'초청2'}},
    B:{name:'B조',teams:{'영남C':'영남C','초청3':'초청3','초청4':'초청4','초청5':'초청5'}}
  });
  toast('A조/B조 편성 완료');
}

function calcStandings(groupTeams,results){
  var stats={};
  Object.keys(groupTeams).forEach(function(t){
    stats[t]={team:t,win:0,lose:0,gf:0,ga:0,gd:0,matches:0};
  });
  
  if(!results) return Object.values(stats);
  
  Object.keys(results).forEach(function(key){
    var r=results[key];
    var tA=r.teamA, tB=r.teamB;
    if(!stats[tA]||!stats[tB]) return;
    
    var sA=r.scoreA||0, sB=r.scoreB||0;
    stats[tA].gf+=sA; stats[tA].ga+=sB; stats[tA].matches++;
    stats[tB].gf+=sB; stats[tB].ga+=sA; stats[tB].matches++;
    
    if(sA>sB){stats[tA].win++;stats[tB].lose++}
    else if(sB>sA){stats[tB].win++;stats[tA].lose++}
  });
  
  Object.values(stats).forEach(function(s){s.gd=s.gf-s.ga});
  
  var arr=Object.values(stats);
  arr.sort(function(a,b){
    if(b.win!==a.win) return b.win-a.win;
    if(b.gd!==a.gd) return b.gd-a.gd;
    return b.gf-a.gf;
  });
  return arr;
}

function renderStandings(){
  groupsRef.once('value',function(gsnap){
    var groups=gsnap.val();
    if(!groups){
      document.getElementById('standingsArea').innerHTML='<div class="result-empty">조 편성을 먼저 초기화해주세요</div>';
      return;
    }
    
    resultsRef.once('value',function(rsnap){
      var allResults=rsnap.val()||{};
      var html='';
      
      ['A','B'].forEach(function(gKey){
        var g=groups[gKey];
        if(!g) return;
        var teams=g.teams||{};
        var standings=calcStandings(teams,allResults);
        
        html+='<div class="standings-group">'
          +'<div class="standings-group-header">'+g.name+' ('+Object.keys(teams).join(', ')+')</div>'
          +'<table class="standings-table"><thead><tr>'
          +'<th>순위</th><th style="text-align:left">팀</th><th>승</th><th>패</th><th>득</th><th>실</th><th>득실</th><th>경기수</th>'
          +'</tr></thead><tbody>';
        
        standings.forEach(function(s,i){
          var qualify=i<2?'standings-qualify':'';
          html+='<tr class="'+qualify+'">'
            +'<td class="standings-rank">'+(i+1)+'</td>'
            +'<td class="standings-team">'+s.team+'</td>'
            +'<td class="standings-win">'+s.win+'</td>'
            +'<td class="standings-lose">'+s.lose+'</td>'
            +'<td>'+s.gf+'</td><td>'+s.ga+'</td>'
            +'<td style="color:'+(s.gd>0?'#D2FF4E':s.gd<0?'#FF6B6B':'#707075')+'">'+( s.gd>0?'+':'')+s.gd+'</td>'
            +'<td>'+s.matches+'</td>'
            +'</tr>';
        });
        html+='</tbody></table></div>';
      });
      
      document.getElementById('standingsArea').innerHTML=html;
    });
  });
}

// Auto-refresh standings when results change
resultsRef.on('value',function(){renderStandings()});

// Init schedule grid based on courts count
courtsRef.once('value',function(snap){
  var data=snap.val();
  var n=data?Object.keys(data).length:5;
  renderScheduleGrid(n);
});

// Results management
function saveResult(key){
  var sa=document.getElementById('sa-'+key);
  var sb=document.getElementById('sb-'+key);
  if(!sa||!sb) return;
  var newA=parseInt(sa.value)||0;
  var newB=parseInt(sb.value)||0;
  resultsRef.child(key).update({scoreA:newA,scoreB:newB});
  toast('점수 수정 완료! ('+newA+':'+newB+')');
}

function deleteResult(key){
  if(!confirm('이 경기 결과를 삭제하시겠습니까?')) return;
  resultsRef.child(key).remove();
  toast('경기 결과 삭제 완료');
}

// Listen for results
resultsRef.orderByChild('timestamp').on('value',function(snap){
  var data=snap.val();
  var container=document.getElementById('resultsList');
  if(!data){
    container.innerHTML='<div class="result-empty">아직 저장된 경기 결과가 없습니다</div>';
    return;
  }
  var results=[];
  Object.keys(data).forEach(function(key){
    var r=data[key]; r._key=key;
    results.push(r);
  });
  results.sort(function(a,b){return(b.timestamp||0)-(a.timestamp||0)});

  var html='';
  results.forEach(function(r){
    html+='<div class="result-card">'
      +'<div class="result-info">'
      +'<div class="result-meta">'+(r.time||'')+' · '+(r.court||'')+' · '+(r.event||'')+' · '+(r.group||'')+'</div>'
      +'<div class="result-match">'+(r.teamA||'?')+' vs '+(r.teamB||'?')+'</div>'
      +'</div>'
      +'<div class="result-score-edit">'
      +'<input class="result-score-input" id="sa-'+r._key+'" type="number" value="'+(r.scoreA||0)+'">'
      +'<span class="result-colon">:</span>'
      +'<input class="result-score-input" id="sb-'+r._key+'" type="number" value="'+(r.scoreB||0)+'">'
      +'</div>'
      +'<div class="result-actions">'
      +'<button class="result-btn save" onclick="saveResult(\''+r._key+'\')">수정</button>'
      +'<button class="result-btn delete" onclick="deleteResult(\''+r._key+'\')">삭제</button>'
      +'</div>'
      +'</div>';
  });
  container.innerHTML=html;
});
</script>
