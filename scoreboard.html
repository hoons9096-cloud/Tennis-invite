<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영남테니스회장배 - 실시간 스코어보드</title>
<meta property="og:title" content="🎾 영남테니스회장배 실시간 스코어보드">
<meta property="og:description" content="경기 진행 상황을 실시간으로 확인하세요!">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0C0C0E;color:#E8E8E8;min-height:100vh}

.header{background:#151518;border-bottom:2px solid #D2FF4E;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:900;color:#D2FF4E}
.header p{font-size:11px;color:#707075;margin-top:2px}

/* Tabs */
.tabs{display:flex;justify-content:center;gap:4px;padding:12px 16px;background:#0C0C0E;position:sticky;top:62px;z-index:99}
.tab{padding:8px 24px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #2A2A30;color:#707075;transition:all .2s;background:transparent}
.tab.active{background:#D2FF4E;color:#0C0C0E;border-color:#D2FF4E}

.container{max-width:900px;margin:0 auto;padding:16px}

/* === LIVE SCORES === */
.section-title{font-size:13px;font-weight:800;color:#D2FF4E;letter-spacing:3px;margin-bottom:12px;padding-left:4px}

.live-courts{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:24px}

.live-card{background:#151518;border:1px solid #2A2A30;border-radius:14px;overflow:hidden;transition:all .3s}
.live-card.active{border-color:#D2FF4E;box-shadow:0 0 24px rgba(210,255,78,.06)}
.live-card.done{opacity:.7}

.live-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1C1C20}
.live-court-name{font-size:12px;font-weight:700;color:#D2FF4E}
.live-event{font-size:10px;color:#707075;font-weight:600}
.live-status{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700}
.live-status.live{background:rgba(255,60,60,.15);color:#FF4444;animation:pulse 2s infinite}
.live-status.done{background:rgba(210,255,78,.1);color:#D2FF4E}
.live-status.waiting{background:rgba(112,112,117,.15);color:#707075}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.live-body{padding:14px}
.live-team{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.live-team-name{font-size:15px;font-weight:700;color:#E8E8E8}
.live-team-name.winner{color:#D2FF4E}
.live-score{font-family:'Bebas Neue',sans-serif;font-size:36px;font-weight:400;color:#FFFFFF;line-height:1}
.live-score.winner{color:#D2FF4E}
.live-vs{text-align:center;font-size:10px;color:#2A2A30;font-weight:700;padding:2px 0}
.live-group{text-align:center;font-size:10px;color:#505055;margin-top:6px;padding-top:6px;border-top:1px solid #1C1C20}

/* === RESULTS === */
.results-table{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:24px}
.results-table th{background:#1C1C20;color:#D2FF4E;font-size:11px;font-weight:700;padding:10px 12px;text-align:left;letter-spacing:1px;border-bottom:1px solid #2A2A30}
.results-table td{background:#151518;padding:10px 12px;font-size:13px;border-bottom:1px solid #1C1C20}
.results-table tr:hover td{background:#1A1A1E}
.result-score{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#FFFFFF}
.result-winner{color:#D2FF4E;font-weight:700}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#707075}
.empty-icon{font-size:40px;margin-bottom:12px;display:block}
.empty-text{font-size:14px}

/* Auto refresh indicator */
.refresh-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#D2FF4E;margin-right:6px;animation:pulse 2s infinite}

/* Hide sections */
.section{display:none}
.section.active{display:block}

/* Schedule display */
.next-banner{background:#1A2A10;border:1px solid #2A3A18;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.next-label{font-size:11px;font-weight:700;color:#D2FF4E;letter-spacing:2px}
.next-value{font-size:14px;font-weight:800;color:#E8E8E8}
.next-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px}
.next-card{background:#151518;border:1px solid #2A2A30;border-radius:10px;padding:12px;text-align:center}
.next-court{font-size:11px;font-weight:800;color:#D2FF4E;margin-bottom:6px}
.next-teams{font-size:13px;font-weight:700;color:#E8E8E8;margin-bottom:2px}
.next-meta{font-size:10px;color:#707075}

/* Standings */
.st-group{background:#151518;border:1px solid #2A2A30;border-radius:12px;margin-bottom:16px;overflow:hidden}
.st-group-hdr{background:#1C1C20;padding:10px 16px;font-size:13px;font-weight:800;color:#D2FF4E}
.st-tbl{width:100%;border-collapse:collapse}
.st-tbl th{font-size:10px;font-weight:700;color:#707075;padding:8px 10px;text-align:center;border-bottom:1px solid #2A2A30}
.st-tbl td{font-size:13px;padding:8px 10px;text-align:center;border-bottom:1px solid #1C1C20}
.st-tbl tr:hover td{background:#1A1A1E}
.st-rank{font-weight:900;color:#D2FF4E;font-size:15px}
.st-team{font-weight:700;color:#E8E8E8;text-align:left!important}
.st-qualify{background:rgba(210,255,78,.04)!important}
</style>
</head>
<body>

<div class="header">
  <h1>🎾 영남테니스회장배 초청 대회</h1>
  <p><span class="refresh-dot"></span>실시간 업데이트 중 · 2026.4.25</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('live',this)">실시간 스코어</div>
  <div class="tab" onclick="showTab('standings',this)">순위표</div>
  <div class="tab" onclick="showTab('results',this)">경기 결과</div>
</div>

<div class="container">

  <!-- Live Scores -->
  <div class="section active" id="sec-live">
    <div class="section-title">LIVE COURTS</div>
    <div class="live-courts" id="liveCourts">
      <div class="empty"><span class="empty-icon">🎾</span><div class="empty-text">아직 경기가 시작되지 않았습니다</div></div>
    </div>
  </div>

  
  <!-- Standings -->
  <div class="section" id="sec-standings">
    <div class="section-title">조별 순위표</div>
    <div id="standingsDisplay">
      <div class="empty"><span class="empty-icon">🏆</span><div class="empty-text">아직 순위 정보가 없습니다</div></div>
    </div>
  </div>

  <!-- Results -->
  <div class="section" id="sec-results">
    <div class="section-title">경기 결과</div>
    <div id="resultsArea">
      <div class="empty"><span class="empty-icon">📋</span><div class="empty-text">아직 완료된 경기가 없습니다</div></div>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBLEGto1SK7JiowYJJCuBCfpBsjrkiqklM",
  authDomain: "tennis-score-a3654.firebaseapp.com",
  databaseURL: "https://tennis-score-a3654-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tennis-score-a3654",
  storageBucket: "tennis-score-a3654.firebasestorage.app",
  messagingSenderId: "361320303748",
  appId: "1:361320303748:web:0238102b53e7209cef86d1"
});

var db = firebase.database();

function showTab(tab,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  if(el) el.classList.add('active');
  document.getElementById('sec-'+tab).classList.add('active');
}

// Live courts
db.ref('courts').on('value',function(snap){
  var data=snap.val();
  var container=document.getElementById('liveCourts');
  if(!data){
    container.innerHTML='<div class="empty"><span class="empty-icon">🎾</span><div class="empty-text">아직 경기가 시작되지 않았습니다</div></div>';
    return;
  }
  
  var html='';
  Object.keys(data).sort().forEach(function(key){
    var d=data[key];
    var statusClass=d.status==='live'?'live':d.status==='done'?'done':'waiting';
    var statusText=d.status==='live'?'● LIVE':d.status==='done'?'종료':'대기';
    var isWinnerA=d.status==='done'&&d.scoreA>d.scoreB;
    var isWinnerB=d.status==='done'&&d.scoreB>d.scoreA;
    
    html+='<div class="live-card '+(d.status==='live'?'active':d.status==='done'?'done':'')+'">'
      +'<div class="live-header">'
      +'<span class="live-court-name">'+d.name+'</span>'
      +'<div><span class="live-event">'+(d.event||'')+'</span> <span class="live-status '+statusClass+'">'+statusText+'</span></div>'
      +'</div>'
      +'<div class="live-body">'
      +'<div class="live-team"><span class="live-team-name '+(isWinnerA?'winner':'')+'">'+(d.teamA||'—')+'</span><span class="live-score '+(isWinnerA?'winner':'')+'">'+(d.scoreA||0)+'</span></div>'
      +'<div class="live-vs">VS</div>'
      +'<div class="live-team"><span class="live-team-name '+(isWinnerB?'winner':'')+'">'+(d.teamB||'—')+'</span><span class="live-score '+(isWinnerB?'winner':'')+'">'+(d.scoreB||0)+'</span></div>'
      +(d.group?'<div class="live-group">'+d.group+'</div>':'')
      +'</div></div>';
  });
  container.innerHTML=html;
});

// Results
db.ref('results').orderByChild('timestamp').on('value',function(snap){
  var data=snap.val();
  var area=document.getElementById('resultsArea');
  if(!data){
    area.innerHTML='<div class="empty"><span class="empty-icon">📋</span><div class="empty-text">아직 완료된 경기가 없습니다</div></div>';
    return;
  }
  
  // Convert to array and sort by timestamp desc
  var results=[];
  Object.keys(data).forEach(function(key){results.push(data[key])});
  results.sort(function(a,b){return(b.timestamp||0)-(a.timestamp||0)});
  
  var html='<table class="results-table"><thead><tr>'
    +'<th>시간</th><th>코트</th><th>종목</th><th>팀 A</th><th>스코어</th><th>팀 B</th><th>조</th>'
    +'</tr></thead><tbody>';
  
  results.forEach(function(r){
    var winA=r.scoreA>r.scoreB;
    var winB=r.scoreB>r.scoreA;
    html+='<tr>'
      +'<td>'+(r.time||'')+'</td>'
      +'<td>'+(r.court||'')+'</td>'
      +'<td>'+(r.event||'')+'</td>'
      +'<td class="'+(winA?'result-winner':'')+'">'+(r.teamA||'')+'</td>'
      +'<td><span class="result-score">'+(r.scoreA||0)+' : '+(r.scoreB||0)+'</span></td>'
      +'<td class="'+(winB?'result-winner':'')+'">'+(r.teamB||'')+'</td>'
      +'<td>'+(r.group||'')+'</td>'
      +'</tr>';
  });
  
  html+='</tbody></table>';
  area.innerHTML=html;
});

// Schedule display
db.ref('schedule').on('value',function(snap){
  var data=snap.val();
  var container=document.getElementById('schedDisplay');
  if(!data){
    container.innerHTML='<div class="empty"><span class="empty-icon">📋</span><div class="empty-text">아직 배정 정보가 없습니다</div></div>';
    return;
  }
  var meta=data.meta||{};
  var next=data.next||{};
  
  var html='';
  if(meta.currentRound||meta.nextRound){
    html+='<div class="next-banner">';
    if(meta.currentRound) html+='<div><div class="next-label">현재</div><div class="next-value">'+meta.currentRound+'</div></div>';
    if(meta.nextRound) html+='<div><div class="next-label">다음</div><div class="next-value">'+meta.nextRound+'</div></div>';
    html+='</div>';
  }
  
  var keys=Object.keys(next).sort();
  if(keys.length>0){
    html+='<div class="next-grid">';
    keys.forEach(function(key){
      var c=next[key];
      html+='<div class="next-card">'
        +'<div class="next-court">'+key.replace('court','코트 ')+'</div>'
        +'<div class="next-teams">'+(c.teamA||'?')+' vs '+(c.teamB||'?')+'</div>'
        +'<div class="next-meta">'+(c.event||'')+' · '+(c.group||'')+'</div>'
        +'</div>';
    });
    html+='</div>';
  } else {
    html+='<div class="empty"><span class="empty-icon">📋</span><div class="empty-text">다음 타임 배정 대기 중</div></div>';
  }
  container.innerHTML=html;
});

// Standings
function calcStandings(groupTeams,results){
  var stats={};
  Object.keys(groupTeams).forEach(function(t){
    stats[t]={team:t,win:0,lose:0,gf:0,ga:0,gd:0,matches:0};
  });
  if(!results) return Object.values(stats);
  Object.keys(results).forEach(function(key){
    var r=results[key];
    var tA=r.teamA,tB=r.teamB;
    if(!stats[tA]||!stats[tB]) return;
    var sA=r.scoreA||0,sB=r.scoreB||0;
    stats[tA].gf+=sA;stats[tA].ga+=sB;stats[tA].matches++;
    stats[tB].gf+=sB;stats[tB].ga+=sA;stats[tB].matches++;
    if(sA>sB){stats[tA].win++;stats[tB].lose++}
    else if(sB>sA){stats[tB].win++;stats[tA].lose++}
  });
  Object.values(stats).forEach(function(s){s.gd=s.gf-s.ga});

  // 3순위: 상대전적 (승자 승)
  function h2hWin(tA,tB){
    var w=0;
    if(!results) return w;
    Object.keys(results).forEach(function(k){
      var r=results[k];
      if(r.teamA===tA&&r.teamB===tB&&(r.scoreA||0)>(r.scoreB||0)) w++;
      if(r.teamA===tB&&r.teamB===tA&&(r.scoreB||0)>(r.scoreA||0)) w++;
    });
    return w;
  }

  var arr=Object.values(stats);
  arr.sort(function(a,b){
    if(b.gd!==a.gd) return b.gd-a.gd;              // 1. 득실차
    if(b.win!==a.win) return b.win-a.win;            // 2. 승 수
    return h2hWin(b.team,a.team)-h2hWin(a.team,b.team); // 3. 상대전적
  });
  return arr;
}

function renderPublicStandings(){
  db.ref('groups').once('value',function(gsnap){
    var groups=gsnap.val();
    var container=document.getElementById('standingsDisplay');
    if(!groups){
      container.innerHTML='<div class="empty"><span class="empty-icon">🏆</span><div class="empty-text">아직 순위 정보가 없습니다</div></div>';
      return;
    }
    db.ref('results').once('value',function(rsnap){
      var allResults=rsnap.val()||{};
      var html='';
      ['A','B'].forEach(function(gKey){
        var g=groups[gKey];
        if(!g) return;
        var teams=g.teams||{};
        var standings=calcStandings(teams,allResults);
        html+='<div class="st-group"><div class="st-group-hdr">'+g.name+'</div>'
          +'<table class="st-tbl"><thead><tr>'
          +'<th>순위</th><th style="text-align:left">팀</th><th>득실차</th><th>승</th><th>패</th><th>득</th><th>실</th><th>경기</th>'
          +'</tr></thead><tbody>';
        standings.forEach(function(s,i){
          var q=i<2?'st-qualify':'';
          html+='<tr class="'+q+'">'
            +'<td class="st-rank">'+(i+1)+'</td>'
            +'<td class="st-team">'+s.team+'</td>'
            +'<td style="color:'+(s.gd>0?'#D2FF4E':s.gd<0?'#FF6B6B':'#707075')+';font-weight:700">'+(s.gd>0?'+':'')+s.gd+'</td>'
            +'<td style="color:#D2FF4E;font-weight:700">'+s.win+'</td>'
            +'<td style="color:#FF6B6B;font-weight:700">'+s.lose+'</td>'
            +'<td>'+s.gf+'</td><td>'+s.ga+'</td>'
            +'<td>'+s.matches+'</td></tr>';
        });
        html+='</tbody></table></div>';
      });
      container.innerHTML=html;
    });
  });
}
db.ref('results').on('value',function(){renderPublicStandings()});
db.ref('groups').on('value',function(){renderPublicStandings()});
</script>
</body>
</html>
