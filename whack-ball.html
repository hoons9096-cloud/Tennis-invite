<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎾 공 잡아라! - 영남테니스클럽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a1a08;display:flex;justify-content:center;align-items:center;min-height:100dvh;font-family:'Noto Sans KR',sans-serif;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
  #app{position:relative;width:100%;max-width:420px;height:100dvh;max-height:860px;overflow:hidden;background:linear-gradient(180deg,#0a1a08 0%,#14300f 40%,#1a4015 60%,#14300f 80%,#0a1a08 100%)}

  /* Court texture */
  #app::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 29px,rgba(255,255,255,0.02) 29px,rgba(255,255,255,0.02) 30px),repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(255,255,255,0.02) 29px,rgba(255,255,255,0.02) 30px);pointer-events:none;z-index:0}

  .hud{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;background:linear-gradient(180deg,rgba(10,26,8,0.95),transparent)}
  .hud-item{text-align:center;flex:1}
  .hud-label{font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px}
  .hud-value{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#fff}
  .hud-value.score{color:#c8ff00}
  .hud-value.timer{color:#ffd700}
  .hud-value.combo{color:#ff8844}

  .timer-bar-wrap{position:absolute;top:50px;left:0;right:0;height:4px;background:rgba(255,255,255,0.05);z-index:9}
  .timer-bar{height:100%;background:linear-gradient(90deg,#c8ff00,#ffd700);transition:width 0.1s linear;border-radius:0 2px 2px 0}

  /* COURT GRID */
  .court{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px;z-index:5;width:calc(100% - 32px);max-width:360px}

  .hole{aspect-ratio:1;position:relative;border-radius:20px;background:radial-gradient(ellipse at center bottom,rgba(0,0,0,0.4) 0%,rgba(0,0,0,0.1) 60%,transparent 100%);overflow:hidden;cursor:pointer}
  .hole::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:30%;background:radial-gradient(ellipse at center,rgba(0,50,0,0.5),transparent);border-radius:50%;pointer-events:none}

  /* Ball in hole */
  .ball{position:absolute;left:50%;bottom:-80px;transform:translateX(-50%);width:70px;height:70px;border-radius:50%;transition:bottom 0.12s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
  .ball.up{bottom:15px;pointer-events:auto}
  .ball.hit{bottom:15px;transform:translateX(-50%) scale(1.3);opacity:0;transition:all 0.15s ease-out}

  .ball-normal{background:radial-gradient(circle at 35% 30%,#e8ff66,#c8ff00 50%,#7fa800);box-shadow:0 4px 20px rgba(200,255,0,0.4),inset 0 -3px 6px rgba(0,0,0,0.2)}
  .ball-normal::before,.ball-normal::after{content:'';position:absolute;border:2px solid rgba(255,255,255,0.3);border-radius:50%}
  .ball-normal::before{top:12%;left:18%;right:18%;bottom:48%;border-bottom:none;transform:rotate(-12deg)}
  .ball-normal::after{top:48%;left:18%;right:18%;bottom:12%;border-top:none;transform:rotate(-12deg)}

  .ball-gold{background:radial-gradient(circle at 35% 30%,#fff7aa,#ffd700 50%,#b8860b);box-shadow:0 4px 25px rgba(255,215,0,0.5),0 0 40px rgba(255,215,0,0.2)}
  .ball-gold::before{content:'★';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;color:rgba(255,255,255,0.6)}

  .ball-bomb{background:radial-gradient(circle at 35% 30%,#ff8888,#cc2222 50%,#880000);box-shadow:0 4px 20px rgba(255,0,0,0.4)}
  .ball-bomb::before{content:'💣';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px}

  .ball-speed{background:radial-gradient(circle at 35% 30%,#aaddff,#4488ff 50%,#2255aa);box-shadow:0 4px 20px rgba(68,136,255,0.4)}
  .ball-speed::before{content:'⚡';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px}

  /* Hit effects */
  .hit-particles{position:absolute;inset:0;pointer-events:none;z-index:15}
  .particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFly 0.5s ease-out forwards}
  @keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

  .score-popup{position:absolute;font-family:'Orbitron',monospace;font-size:18px;font-weight:900;pointer-events:none;z-index:20;animation:scoreUp 0.6s ease-out forwards}
  .score-popup.plus{color:#c8ff00;text-shadow:0 0 10px rgba(200,255,0,0.6)}
  .score-popup.bonus{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.6)}
  .score-popup.minus{color:#ff4444;text-shadow:0 0 10px rgba(255,68,68,0.6)}
  @keyframes scoreUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.2)}}

  .combo-text{position:fixed;top:30%;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff8844;text-shadow:0 0 20px rgba(255,136,68,0.6);z-index:25;pointer-events:none;animation:comboPop 0.7s ease-out forwards}
  @keyframes comboPop{0%{opacity:0;transform:translateX(-50%) scale(0.5)}20%{opacity:1;transform:translateX(-50%) scale(1.1)}40%{transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}

  .screen-flash{position:fixed;inset:0;pointer-events:none;z-index:30;animation:sflash 0.2s ease-out forwards}
  @keyframes sflash{0%{opacity:1}100%{opacity:0}}

  /* Screens */
  .screen-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 24px 30px;z-index:50;background:rgba(8,20,6,0.93);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.3s;overflow-y:auto}
  .screen-overlay.visible{opacity:1;pointer-events:auto}
  .logo-emoji{font-size:46px;margin-bottom:4px}
  .game-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#c8ff00;text-shadow:0 0 25px rgba(200,255,0,0.3);margin-bottom:2px}
  .game-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:14px}
  .name-section{width:85%;margin-bottom:14px}
  .name-input{width:100%;padding:11px 16px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:2px solid rgba(200,255,0,0.25);border-radius:14px;background:rgba(200,255,0,0.04);color:#fff;text-align:center;outline:none;transition:border-color 0.2s}
  .name-input::placeholder{color:rgba(255,255,255,0.2)}
  .name-input:focus{border-color:#c8ff00}
  .name-hint{font-size:10px;color:rgba(255,255,255,0.25);margin-top:4px;text-align:center}
  .rules{background:rgba(200,255,0,0.04);border:1px solid rgba(200,255,0,0.1);border-radius:14px;padding:12px 14px;width:85%;margin-bottom:14px;font-size:12px;color:rgba(255,255,255,0.5);line-height:1.8;text-align:left}
  .rules b{color:#c8ff00}
  .btn{background:linear-gradient(135deg,#c8ff00,#7acc00);color:#0b1a0b;border:none;padding:13px 44px;font-size:16px;font-weight:900;font-family:'Noto Sans KR',sans-serif;border-radius:50px;cursor:pointer;box-shadow:0 4px 25px rgba(200,255,0,0.25);transition:transform 0.15s}
  .btn:active{transform:scale(0.95)}
  .btn-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
  .btn-sm{padding:11px 24px;font-size:14px}
  .btn-kakao{background:linear-gradient(135deg,#fee500,#f0d000);color:#3c1e1e}
  .result-card{background:rgba(255,255,255,0.04);border:1px solid rgba(200,255,0,0.1);border-radius:20px;padding:16px;width:90%;margin-bottom:12px;text-align:center}
  .big-score{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:#fff;text-shadow:0 0 25px rgba(200,255,0,0.25)}
  .big-score small{font-size:16px;color:rgba(255,255,255,0.4)}
  .grade{font-size:18px;margin:4px 0 8px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;width:100%;margin-top:10px}
  .stat-box{background:rgba(200,255,0,0.04);border-radius:10px;padding:8px 4px;text-align:center}
  .stat-box .val{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#c8ff00}
  .stat-box .lab{font-size:8px;color:rgba(255,255,255,0.35);margin-top:2px}
  .ranking-card{background:rgba(255,255,255,0.04);border:1px solid rgba(200,255,0,0.1);border-radius:20px;padding:14px;width:90%;margin-bottom:12px}
  .ranking-title{font-size:13px;font-weight:900;color:#c8ff00;margin-bottom:8px;text-align:center}
  .rank-row{display:flex;justify-content:space-between;align-items:center;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;color:rgba(255,255,255,0.65)}
  .rank-row:last-child{border:none}
  .rank-row.me{background:rgba(200,255,0,0.07);border-radius:8px}
  .rank-left{display:flex;align-items:center;gap:6px}
  .rank-medal{font-size:15px;width:20px;text-align:center}
  .rank-num{font-family:'Orbitron',monospace;font-size:10px;color:rgba(255,255,255,0.25);width:20px;text-align:center}
  .rank-name{font-weight:700}
  .rank-time{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#c8ff00}
  .rank-date{font-size:8px;color:rgba(255,255,255,0.18);margin-left:3px}
  .ranking-loading{text-align:center;font-size:11px;color:rgba(255,255,255,0.25);padding:10px}
  @keyframes countPop{0%{transform:scale(2);opacity:0}30%{transform:scale(1);opacity:1}80%{opacity:1}100%{opacity:0;transform:scale(0.8)}}
</style>
</head>
<body>
<div id="app">
  <div class="hud" id="hud" style="display:none">
    <div class="hud-item"><div class="hud-label">점수</div><div class="hud-value score" id="hudScore">0</div></div>
    <div class="hud-item"><div class="hud-label">콤보</div><div class="hud-value combo" id="hudCombo">0</div></div>
    <div class="hud-item"><div class="hud-label">시간</div><div class="hud-value timer" id="hudTimer">30</div></div>
  </div>
  <div class="timer-bar-wrap" id="tbWrap" style="display:none"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>

  <div class="court" id="court" style="display:none"></div>
  <div class="hit-particles" id="particles"></div>

  <!-- START -->
  <div class="screen-overlay visible" id="startScreen">
    <div class="logo-emoji">🎯</div>
    <div class="game-title">공 잡아라!</div>
    <div class="game-sub">영남테니스클럽 반사신경 훈련</div>
    <div class="name-section">
      <input type="text" class="name-input" id="nameInput" placeholder="이름 입력 (예: 홍길동)" maxlength="8">
      <div class="name-hint">랭킹에 표시될 이름이에요</div>
    </div>
    <div class="ranking-card" style="width:85%">
      <div class="ranking-title">🏆 클럽 랭킹 TOP 5</div>

    </div>
    <div class="rules">
      🎾 튀어오르는 <b>테니스공</b>을 빠르게 터치!<br>
      🌟 <b>골드볼</b> — 3배 점수!<br>
      ⚡ <b>스피드볼</b> — 빨리 사라짐, 2배!<br>
      💣 <b>폭탄</b> — 누르면 감점! 참으세요<br>
      🔥 연속 터치 시 <b>콤보 보너스!</b><br>
      ⏱️ <b>30초</b> 안에 최고점을 노려라!
    </div>
    <button class="btn" onclick="beginGame()">시작하기</button>
  </div>

  <!-- RESULT -->
  <div class="screen-overlay" id="resultScreen">
    <div class="logo-emoji" id="resultEmoji">🎯</div>
    <div class="grade" id="gradeText"></div>
    <div class="result-card">
      <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:4px">점수</div>
      <div class="big-score" id="finalScore">0<small>점</small></div>
      <div class="stats-grid">
        <div class="stat-box"><div class="val" id="statHit">-</div><div class="lab">적중</div></div>
        <div class="stat-box"><div class="val" id="statMiss">-</div><div class="lab">놓침</div></div>
        <div class="stat-box"><div class="val" id="statBomb">-</div><div class="lab">폭탄</div></div>
        <div class="stat-box"><div class="val" id="statCombo">-</div><div class="lab">최대콤보</div></div>
      </div>
    </div>
    <div class="ranking-card">
      <div class="ranking-title">🏆 클럽 랭킹</div>
      <div id="resultRankList"><div class="ranking-loading">불러오는 중...</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-sm" onclick="goHome()">홈으로</button>
      <button class="btn btn-sm btn-kakao" onclick="shareResult()">카톡 공유</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var db=null,fbOK=false;
try{firebase.initializeApp({apiKey:"AIzaSyAhJC21VhFB3girRgLgCMPW_xWp-qcy70M",authDomain:"tennis-score-a3654.firebaseapp.com",databaseURL:"https://tennis-score-a3654-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"tennis-score-a3654"});db=firebase.database();fbOK=true;}catch(e){}
function getRef(){return fbOK?db.ref('whack/rankings'):null;}

var GAME_TIME=30;
var playerName='',score=0,hits=0,misses=0,bombs=0,combo=0,maxCombo=0;
var gameTimer=null,spawnTimer=null,timeLeft=0,running=false;
var holes=[],activeBalls=[];
var spawnInterval=900; // gets faster

playerName=localStorage.getItem('whackName')||'';
document.getElementById('nameInput').value=playerName;
loadRankings('startRankList');

function buildCourt(){
  var court=document.getElementById('court');court.innerHTML='';holes=[];activeBalls=[];
  for(var i=0;i<9;i++){
    var hole=document.createElement('div');hole.className='hole';hole.dataset.idx=i;
    var ball=document.createElement('div');ball.className='ball ball-normal';ball.dataset.idx=i;
    hole.appendChild(ball);
    hole.addEventListener('pointerdown',function(e){e.preventDefault();tapHole(parseInt(this.dataset.idx));});
    court.appendChild(hole);
    holes.push({el:hole,ballEl:ball,active:false,type:'normal',timer:null});
  }
}

function spawnBall(){
  if(!running)return;
  // Find empty holes
  var empty=[];
  holes.forEach(function(h,i){if(!h.active)empty.push(i);});
  if(empty.length===0)return;

  var idx=empty[Math.floor(Math.random()*empty.length)];
  var h=holes[idx];

  // Determine type
  var r=Math.random(),type,duration;
  if(r<0.12){type='bomb';duration=1800;}
  else if(r<0.22){type='gold';duration=1200;}
  else if(r<0.32){type='speed';duration=600;}
  else{type='normal';duration=1000+Math.random()*400;}

  // Adjust duration based on elapsed time (gets harder)
  var elapsed=GAME_TIME-timeLeft;
  var speedup=Math.max(0.5,1-elapsed*0.012);
  duration*=speedup;

  h.active=true;h.type=type;
  var ball=h.ballEl;
  ball.className='ball ball-'+type;
  ball.classList.add('up');

  h.timer=setTimeout(function(){
    if(h.active){
      // Missed
      ball.classList.remove('up');
      h.active=false;
      if(type!=='bomb'){misses++;combo=0;updateHUD();}
    }
  },duration);
}

function tapHole(idx){
  var h=holes[idx];
  if(!h.active||!running)return;

  clearTimeout(h.timer);
  var ball=h.ballEl;
  var rect=ball.getBoundingClientRect();
  var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;

  if(h.type==='bomb'){
    // Hit bomb!
    bombs++;combo=0;
    score=Math.max(0,score-15);
    ball.classList.add('hit');
    h.active=false;
    setTimeout(function(){ball.classList.remove('up','hit');},200);
    spawnParticles(cx,cy,'#ff4444',8);
    showPopup(cx,cy,'-15','minus');
    screenFlash('rgba(255,0,0,0.15)');
    updateHUD();
    return;
  }

  // Good hit
  hits++;combo++;
  if(combo>maxCombo)maxCombo=combo;

  var pts=10;
  if(h.type==='gold')pts=30;
  else if(h.type==='speed')pts=20;

  // Combo bonus
  if(combo>=10)pts+=10;
  else if(combo>=5)pts+=5;

  score+=pts;

  ball.classList.add('hit');
  h.active=false;
  setTimeout(function(){ball.classList.remove('up','hit');},200);

  var color=h.type==='gold'?'#ffd700':h.type==='speed'?'#4488ff':'#c8ff00';
  spawnParticles(cx,cy,color,6);
  showPopup(cx,cy,'+'+pts,h.type==='gold'?'bonus':'plus');

  if(combo===5||combo===10||combo===15||combo===20){
    showCombo(combo);
  }

  updateHUD();
}

function spawnParticles(cx,cy,color,n){
  var container=document.getElementById('particles');
  for(var i=0;i<n;i++){
    var p=document.createElement('div');p.className='particle';
    p.style.left=cx+'px';p.style.top=cy+'px';
    p.style.width='8px';p.style.height='8px';
    p.style.background=color;
    var angle=Math.random()*Math.PI*2;
    var dist=30+Math.random()*40;
    p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    container.appendChild(p);
    setTimeout(function(el){el.remove();},500,p);
  }
}

function showPopup(cx,cy,text,cls){
  var el=document.createElement('div');el.className='score-popup '+cls;
  el.style.left=cx+'px';el.style.top=(cy-30)+'px';el.style.transform='translateX(-50%)';
  el.style.position='fixed';el.innerText=text;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},600);
}

function showCombo(n){
  var el=document.createElement('div');el.className='combo-text';
  el.innerText=n>=15?n+'x COMBO!! 🔥🔥🔥':n>=10?n+'x COMBO! 🔥🔥':n+'x COMBO! 🔥';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},700);
}

function screenFlash(color){
  var el=document.createElement('div');el.className='screen-flash';el.style.background=color;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},200);
}

function updateHUD(){
  document.getElementById('hudScore').innerText=score;
  document.getElementById('hudCombo').innerText=combo>0?combo+'🔥':'0';
}

function beginGame(){
  var ni=document.getElementById('nameInput');playerName=ni.value.trim();
  if(!playerName){ni.style.borderColor='#ff4444';ni.focus();ni.placeholder='이름을 입력해주세요!';setTimeout(function(){ni.style.borderColor='rgba(200,255,0,0.25)';},1500);return;}
  localStorage.setItem('whackName',playerName);

  score=0;hits=0;misses=0;bombs=0;combo=0;maxCombo=0;timeLeft=GAME_TIME;running=false;

  document.getElementById('startScreen').classList.remove('visible');
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('hud').style.display='flex';
  document.getElementById('tbWrap').style.display='block';
  document.getElementById('court').style.display='grid';
  updateHUD();
  document.getElementById('hudTimer').innerText=GAME_TIME;
  document.getElementById('timerBar').style.width='100%';

  buildCourt();

  // Countdown
  var countEl=document.createElement('div');
  countEl.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,0.5);pointer-events:none';
  document.body.appendChild(countEl);
  var n=3;
  function tick(){
    if(n===0){countEl.remove();startGame();return;}
    countEl.innerHTML='<div style="font-family:Orbitron,monospace;font-size:72px;font-weight:900;color:#c8ff00;text-shadow:0 0 40px rgba(200,255,0,0.5);animation:countPop 0.6s ease-out forwards">'+n+'</div>';
    n--;setTimeout(tick,700);
  }
  tick();
}

function startGame(){
  running=true;
  var startT=Date.now();

  gameTimer=setInterval(function(){
    var passed=(Date.now()-startT)/1000;
    timeLeft=Math.max(0,GAME_TIME-passed);
    document.getElementById('hudTimer').innerText=Math.ceil(timeLeft);
    document.getElementById('timerBar').style.width=(timeLeft/GAME_TIME*100)+'%';
    if(timeLeft<=0){
      running=false;clearInterval(gameTimer);clearInterval(spawnTimer);
      holes.forEach(function(h){if(h.timer)clearTimeout(h.timer);h.active=false;h.ballEl.classList.remove('up');});
      setTimeout(showResult,400);
    }
  },100);

  // Spawn loop with increasing speed
  function scheduleSpawn(){
    if(!running)return;
    var elapsed=GAME_TIME-timeLeft;
    var interval=Math.max(350,900-elapsed*18);
    // Sometimes spawn 2 at once later in game
    spawnBall();
    if(elapsed>15&&Math.random()<0.3)setTimeout(spawnBall,100);
    if(elapsed>25&&Math.random()<0.3)setTimeout(spawnBall,200);
    spawnTimer=setTimeout(scheduleSpawn,interval);
  }
  scheduleSpawn();
}

function showResult(){
  document.getElementById('hud').style.display='none';
  document.getElementById('tbWrap').style.display='none';
  document.getElementById('court').style.display='none';

  var grade,emoji;
  if(score>=500){grade='⚡ 프로 수비수!';emoji='🏆';}
  else if(score>=350){grade='🔥 엘리트 반사신경!';emoji='🥇';}
  else if(score>=200){grade='💪 빠른 손!';emoji='🥈';}
  else if(score>=100){grade='👍 괜찮아요!';emoji='🥉';}
  else{grade='🐢 눈이 따라가나요?';emoji='😅';}

  document.getElementById('resultEmoji').innerText=emoji;
  document.getElementById('gradeText').innerText=grade;
  document.getElementById('finalScore').innerHTML=score+'<small>점</small>';
  document.getElementById('statHit').innerText=hits;
  document.getElementById('statMiss').innerText=misses;
  document.getElementById('statBomb').innerText=bombs;
  document.getElementById('statCombo').innerText=maxCombo+'x';

  saveScore(playerName,score,hits,misses,bombs,maxCombo);
  setTimeout(function(){loadRankings('resultRankList');},500);
  document.getElementById('resultScreen').classList.add('visible');
}

function goHome(){
  document.getElementById('resultScreen').classList.remove('visible');
  loadRankings('startRankList');
  document.getElementById('startScreen').classList.add('visible');
}

// Rankings
function saveScore(name,sc,h,m,b,mc){
  var key=name.replace(/[.#$/\[\]]/g,'_');
  var entry={name:name,score:sc,hits:h,misses:m,bombs:b,maxCombo:mc,date:new Date().toISOString()};
  try{var lo=JSON.parse(localStorage.getItem('whackRank')||'{}');if(!lo[key]||sc>lo[key].score)lo[key]=entry;localStorage.setItem('whackRank',JSON.stringify(lo));}catch(e){}
  var ref=getRef();if(!ref)return;
  ref.child(key).once('value').then(function(s){var ex=s.val();if(!ex||sc>ex.score)ref.child(key).set(entry);}).catch(function(){});
}

function loadRankings(tid){
  var c=document.getElementById(tid);
  c.innerHTML='<div class="ranking-loading">불러오는 중...</div>';
  var ref=getRef();
  function render(entries){
    if(!entries||entries.length===0){c.innerHTML='<div class="ranking-loading">아직 기록이 없습니다!</div>';return;}
    entries.sort(function(a,b){return b.score-a.score;});
    var medals=['🥇','🥈','🥉'],me=document.getElementById('nameInput').value.trim()||playerName;
    c.innerHTML='';
    entries.slice(0,10).forEach(function(e,i){
      var isMe=e.name===me,row=document.createElement('div');
      row.className='rank-row'+(isMe?' me':'');
      var ds=e.date?new Date(e.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}):'';
      row.innerHTML='<div class="rank-left">'+(i<3?'<span class="rank-medal">'+medals[i]+'</span>':'<span class="rank-num">'+(i+1)+'</span>')+'<span class="rank-name">'+e.name+(isMe?' 👈':'')+'</span></div><div><span class="rank-time">'+e.score+'점</span><span class="rank-date">'+ds+'</span></div>';
      c.appendChild(row);
    });
  }
  function tryLocal(){try{render(Object.values(JSON.parse(localStorage.getItem('whackRank')||'{}')));}catch(e){c.innerHTML='<div class="ranking-loading">오프라인 모드</div>';}}
  if(ref){ref.orderByChild('score').limitToLast(10).once('value').then(function(s){var d=s.val();if(!d){tryLocal();return;}render(Object.values(d));}).catch(tryLocal);}else{tryLocal();}
}

function shareResult(){
  var msg='🎯 공 잡아라! 🎯\n\n👤 '+playerName+'\n🏅 점수: '+score+'점\n🎾 적중: '+hits+' / 놓침: '+misses+'\n💣 폭탄: '+bombs+'번\n🔥 최대콤보: '+maxCombo+'x\n\n영남테니스클럽 회원들~\n내 점수 이겨봐! 🎯\n\n▶ 도전: https://hoons9096-cloud.github.io/Tennis-invite/whack-ball.html';
  if(navigator.share){navigator.share({title:'공 잡아라!',text:msg}).catch(function(){});}
  else{navigator.clipboard.writeText(msg).then(function(){alert('결과가 복사되었습니다!\n카카오톡에 붙여넣기 하세요 📋');});}
}
